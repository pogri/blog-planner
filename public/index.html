<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 포스팅 자동화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd0;
  --accent: #2d6a4f;
  --accent2: #b7791f;
  --accent3: #c05621;
  --red: #c0392b;
  --text: #1a1a1a;
  --text-dim: #6b6560;
  --text-muted: #a09890;
  --radius: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a09890' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* LOGIN */
.login-screen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:100; background:var(--bg);
}
.login-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:52px 44px;
  width:100%; max-width:420px;
  text-align:center;
  box-shadow: var(--shadow);
}
.login-badge {
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:10px; color:var(--accent);
  letter-spacing:3px; text-transform:uppercase;
  border:1px solid var(--accent);
  padding:4px 14px; border-radius:2px;
  margin-bottom:24px;
}
.login-title {
  font-size:26px; font-weight:900;
  letter-spacing:-0.5px; margin-bottom:8px;
  color:var(--text);
  line-height:1.2;
}
.login-sub { color:var(--text-dim); font-size:13px; margin-bottom:32px; font-weight:300; }
.login-input {
  width:100%; background:var(--bg);
  border:1px solid var(--border); border-radius:8px;
  padding:12px 16px; color:var(--text);
  font-family:'Noto Serif KR',serif; font-size:14px;
  outline:none; margin-bottom:12px;
  transition:border-color 0.2s; text-align:center;
}
.login-input:focus { border-color:var(--accent); }
.login-btn {
  width:100%; background:var(--accent); color:#fff;
  border:none; border-radius:8px; padding:13px;
  font-family:'Noto Serif KR',serif;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:all 0.2s; margin-top:4px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.login-btn:hover { background:#1e4d38; transform:translateY(-1px); box-shadow:0 4px 20px rgba(45,106,79,0.3); }
.login-err {
  background:rgba(192,57,43,0.06); border:1px solid rgba(192,57,43,0.2);
  border-radius:8px; padding:10px; font-size:13px;
  color:var(--red); margin-top:12px; display:none;
}
.admin-toggle { margin-top:20px; color:var(--text-muted); font-size:12px; cursor:pointer; text-decoration:underline; }
.admin-toggle:hover { color:var(--text-dim); }

/* APP */
.app-screen { display:none; }
.container { max-width:860px; margin:0 auto; padding:40px 20px 80px; position:relative; z-index:1; }

/* Topbar */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:44px; flex-wrap:wrap; gap:12px;
  padding-bottom:24px; border-bottom:2px solid var(--border);
}
.topbar-left h1 {
  font-size:clamp(22px,4vw,34px); font-weight:900;
  letter-spacing:-1px; color:var(--text);
}
.topbar-left p { color:var(--text-dim); font-size:13px; margin-top:4px; font-weight:300; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.credit-badge {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:6px 14px;
  font-size:13px; font-weight:500;
  display:flex; align-items:center; gap:6px;
  font-family:'DM Mono',monospace;
}
.credit-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); }
.credit-dot.low { background:var(--accent2); }
.credit-dot.empty { background:var(--red); }
.logout-btn {
  background:transparent; border:1px solid var(--border);
  border-radius:8px; padding:6px 14px;
  color:var(--text-dim); font-size:12px; cursor:pointer;
  transition:all 0.2s; font-family:'DM Mono',monospace;
}
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* CARD */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:20px;
  box-shadow:var(--shadow); overflow:hidden;
  transition:border-color 0.3s;
}
.card.active { border-color:var(--accent); border-left:3px solid var(--accent); }
.card.done { border-color:rgba(45,106,79,0.3); border-left:3px solid rgba(45,106,79,0.4); }
.card.locked { opacity:0.35; pointer-events:none; }

.card-header {
  display:flex; align-items:center; gap:16px;
  padding:20px 24px;
}
.card-num {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500;
  flex-shrink:0;
}
.card.active .card-num { background:var(--accent); color:#fff; }
.card.done .card-num { background:rgba(45,106,79,0.1); color:var(--accent); border:1px solid rgba(45,106,79,0.3); }
.card.locked .card-num { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
.card-title { font-size:16px; font-weight:700; }
.card-sub { font-size:12px; color:var(--text-dim); margin-top:2px; font-weight:300; }
.card-body { padding:0 24px 24px; }

/* Form elements */
.field-group { display:flex; flex-direction:column; gap:6px; flex:1; min-width:140px; }
.field-group label { font-size:11px; color:var(--text-dim); font-family:'DM Mono',monospace; letter-spacing:1px; text-transform:uppercase; }
.input-field {
  flex:1; min-width:160px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:11px 14px;
  color:var(--text); font-family:'Noto Serif KR',serif;
  font-size:14px; outline:none; transition:border-color 0.2s;
}
.input-field:focus { border-color:var(--accent); }
.input-field::placeholder { color:var(--text-muted); }
select.input-field { cursor:pointer; }

.row { display:flex; gap:10px; flex-wrap:wrap; }

.btn {
  padding:11px 22px; border-radius:8px; border:none;
  font-family:'Noto Serif KR',serif;
  font-size:14px; font-weight:700; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
  display:inline-flex; align-items:center; gap:8px;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover:not(:disabled) { background:#1e4d38; transform:translateY(-1px); box-shadow:0 4px 16px rgba(45,106,79,0.3); }
.btn-primary:disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); }
.btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); font-size:13px; padding:8px 14px; }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

.spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
.loading .spinner { display:block; }
.loading .btn-text { display:none; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Category badges */
.cat-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
.cat-btn {
  padding:8px 16px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2);
  font-family:'Noto Serif KR',serif; font-size:13px;
  cursor:pointer; transition:all 0.15s; color:var(--text-dim);
}
.cat-btn:hover { border-color:var(--accent); color:var(--accent); }
.cat-btn.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.cat-btn.needs-ref { border-color:var(--accent2); }
.cat-btn.needs-ref.selected { background:var(--accent2); border-color:var(--accent2); }

/* Output */
.output-area {
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:24px; margin-top:16px;
  line-height:1.9; font-size:14px;
}
.output-area h2 { font-size:18px; font-weight:700; margin:16px 0 8px; color:var(--text); }
.output-area h3 { font-size:15px; font-weight:700; margin:14px 0 6px; color:var(--text); }
.output-area p { margin-bottom:12px; color:var(--text); }
.output-area ul, .output-area ol { margin:8px 0 12px 20px; }
.output-area li { margin-bottom:6px; }

.ref-block {
  background:rgba(183,121,31,0.05);
  border:1px solid rgba(183,121,31,0.2);
  border-radius:8px; padding:16px; margin-top:16px;
}
.ref-block h4 {
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--accent2); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:10px;
}
.ref-item { font-size:12px; color:var(--text-dim); margin-bottom:6px; line-height:1.5; }

.disclaimer {
  background:rgba(192,57,43,0.04);
  border:1px solid rgba(192,57,43,0.15);
  border-radius:8px; padding:14px 16px; margin-top:12px;
  font-size:12px; color:var(--red); line-height:1.6;
  display:flex; gap:10px; align-items:flex-start;
}
.disclaimer-icon { font-size:16px; flex-shrink:0; margin-top:1px; }

/* Title options */
.title-options { margin-top:16px; }
.title-option {
  display:flex; gap:12px; align-items:flex-start;
  padding:12px; border-radius:8px; border:1px solid var(--border);
  margin-bottom:8px; cursor:pointer; transition:all 0.15s;
  background:var(--surface2);
}
.title-option:hover { border-color:var(--accent); background:rgba(45,106,79,0.04); }
.title-option.selected { border-color:var(--accent); background:rgba(45,106,79,0.06); }
.title-n { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); min-width:18px; margin-top:2px; }
.title-text { font-size:14px; font-weight:600; line-height:1.4; }

/* Tags */
.tags-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
.tag {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:4px; padding:4px 10px;
  font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim);
}

/* Copy button */
.copy-area { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }

.err-msg {
  background:rgba(192,57,43,0.06); border:1px solid rgba(192,57,43,0.2);
  border-radius:8px; padding:12px 16px; font-size:13px;
  color:var(--red); margin-top:12px; display:none;
}

.divider { height:1px; background:var(--border); margin:16px 0; }
.reset-area { text-align:center; margin-top:32px; }

/* ADMIN */
.admin-screen { display:none; }
.admin-container { max-width:800px; margin:0 auto; padding:40px 20px 80px; position:relative; z-index:1; }
.admin-header { margin-bottom:32px; padding-bottom:20px; border-bottom:2px solid var(--border); }
.admin-header h1 { font-size:26px; font-weight:900; }
.admin-header p { color:var(--text-dim); font-size:13px; margin-top:4px; }
.admin-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
.admin-card h3 { font-size:13px; font-weight:700; margin-bottom:16px; color:var(--accent2); font-family:'DM Mono',monospace; letter-spacing:1px; text-transform:uppercase; }
.admin-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
.admin-field { display:flex; flex-direction:column; gap:6px; flex:1; min-width:120px; }
.admin-field label { font-size:11px; color:var(--text-dim); font-family:'DM Mono',monospace; }
.admin-input { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:'Noto Serif KR',serif; font-size:14px; outline:none; transition:border-color 0.2s; }
.admin-input:focus { border-color:var(--accent); }
.user-table { width:100%; border-collapse:collapse; font-size:13px; }
.user-table th { text-align:left; padding:8px 12px; color:var(--text-dim); font-weight:500; border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:1px; font-family:'DM Mono',monospace; }
.user-table td { padding:10px 12px; border-bottom:1px solid rgba(224,219,208,0.5); }
.user-table tr:last-child td { border-bottom:none; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; font-family:'DM Mono',monospace; }
.badge-active { background:rgba(45,106,79,0.1); color:var(--accent); }
.badge-inactive { background:rgba(192,57,43,0.1); color:var(--red); }
.badge-low { background:rgba(183,121,31,0.1); color:var(--accent2); }
.admin-msg { font-size:13px; padding:10px 14px; border-radius:8px; margin-top:10px; display:none; }
.admin-msg.ok { background:rgba(45,106,79,0.08); color:var(--accent); border:1px solid rgba(45,106,79,0.2); }
.admin-msg.err { background:rgba(192,57,43,0.06); color:var(--red); border:1px solid rgba(192,57,43,0.2); }

/* Reference needs indicator */
.ref-badge {
  display:inline-block; background:rgba(183,121,31,0.1);
  border:1px solid rgba(183,121,31,0.3); color:var(--accent2);
  font-size:10px; padding:2px 8px; border-radius:10px;
  font-family:'DM Mono',monospace; margin-left:8px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-badge">Blog Planner</div>
    <div class="login-title">블로그 포스팅<br>자동화</div>
    <div class="login-sub">아이디와 비밀번호를 입력하세요</div>
    <input type="text" class="login-input" id="loginId" placeholder="아이디" autocomplete="off">
    <input type="password" class="login-input" id="loginPw" placeholder="비밀번호">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span class="spinner"></span>
      <span class="btn-text">로그인</span>
    </button>
    <div class="login-err" id="loginErr"></div>
    <div class="admin-toggle" onclick="toggleAdminLogin()">관리자 로그인</div>
  </div>
</div>

<!-- APP -->
<div class="app-screen" id="appScreen">
  <div class="container">
    <div class="topbar">
      <div class="topbar-left">
        <h1>블로그 포스팅 자동화</h1>
        <p>키워드 입력부터 완성된 포스팅까지 자동 생성</p>
      </div>
      <div class="topbar-right">
        <div class="credit-badge">
          <div class="credit-dot" id="creditDot"></div>
          <span id="creditText">...</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>

    <!-- STEP 1: 기본 설정 -->
    <div class="card active" id="step1">
      <div class="card-header">
        <div class="card-num">1</div>
        <div>
          <div class="card-title">기본 설정</div>
          <div class="card-sub">포스팅할 주제와 기본 옵션을 설정하세요</div>
        </div>
      </div>
      <div class="card-body">
        <div class="row" style="margin-bottom:16px;">
          <div class="field-group" style="flex:2;">
            <label>키워드 / 주제</label>
            <input type="text" class="input-field" id="keyword" placeholder="예: 과일 씻는 법, 스테로이드 부작용, 아이 수학 학습법...">
          </div>
          <div class="field-group">
            <label>플랫폼</label>
            <select class="input-field" id="platform">
              <option value="네이버 블로그">네이버 블로그</option>
              <option value="티스토리">티스토리</option>
              <option value="둘 다">네이버 + 티스토리</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <div class="field-group">
            <label>카테고리</label>
            <div class="cat-grid" id="catGrid">
              <button class="cat-btn" data-cat="의학/건강" data-ref="true" onclick="selectCat(this)">🏥 의학/건강</button>
              <button class="cat-btn" data-cat="육아/교육" onclick="selectCat(this)">👶 육아/교육</button>
              <button class="cat-btn" data-cat="음식/요리" onclick="selectCat(this)">🍳 음식/요리</button>
              <button class="cat-btn" data-cat="재테크/경제" data-ref="true" onclick="selectCat(this)">💰 재테크/경제</button>
              <button class="cat-btn" data-cat="법률" data-ref="true" onclick="selectCat(this)">⚖️ 법률</button>
              <button class="cat-btn" data-cat="라이프스타일" onclick="selectCat(this)">🌿 라이프스타일</button>
              <button class="cat-btn" data-cat="여행" onclick="selectCat(this)">✈️ 여행</button>
              <button class="cat-btn" data-cat="IT/테크" onclick="selectCat(this)">💻 IT/테크</button>
              <button class="cat-btn" data-cat="뷰티/패션" onclick="selectCat(this)">💄 뷰티/패션</button>
              <button class="cat-btn" data-cat="기타" onclick="selectCat(this)">📝 기타</button>
            </div>
          </div>
        </div>

        <div class="row" style="margin-bottom:16px;">
          <div class="field-group">
            <label>포스팅 형식</label>
            <select class="input-field" id="postFormat">
              <option value="정보형">정보 제공형</option>
              <option value="FAQ형">자주 묻는 질문 (FAQ)</option>
              <option value="경험/후기형">경험/후기형</option>
              <option value="비교분석형">비교 분석형</option>
              <option value="가이드형">단계별 가이드형</option>
              <option value="인터뷰형">전문가 인터뷰형</option>
            </select>
          </div>
          <div class="field-group">
            <label>글 길이</label>
            <select class="input-field" id="postLength">
              <option value="500-800자">짧게 (500~800자)</option>
              <option value="1000-1500자" selected>보통 (1,000~1,500자)</option>
              <option value="2000자 이상">길게 (2,000자 이상)</option>
            </select>
          </div>
          <div class="field-group">
            <label>글쓴이 톤</label>
            <select class="input-field" id="postTone">
              <option value="전문적이고 신뢰감 있는">전문적/신뢰감</option>
              <option value="친근하고 쉬운">친근하고 쉬운</option>
              <option value="중립적이고 객관적인">중립적/객관적</option>
              <option value="감성적이고 공감하는">감성적/공감형</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary" id="btn1" onclick="generateTitles()">
          <span class="spinner"></span>
          <span class="btn-text">제목 3개 추천받기 →</span>
        </button>
        <div class="err-msg" id="err1"></div>
      </div>
    </div>

    <!-- STEP 2: 제목 선택 -->
    <div class="card locked" id="step2">
      <div class="card-header">
        <div class="card-num">2</div>
        <div>
          <div class="card-title">제목 선택</div>
          <div class="card-sub">마음에 드는 제목을 선택하거나 직접 수정하세요</div>
        </div>
      </div>
      <div class="card-body">
        <div class="title-options" id="titleOptions"></div>
        <div class="divider"></div>
        <div class="field-group">
          <label>선택한 제목 (수정 가능)</label>
          <input type="text" class="input-field" id="finalTitle" placeholder="제목을 선택하거나 직접 입력하세요">
        </div>
        <div style="margin-top:14px;">
          <button class="btn btn-primary" id="btn2" onclick="generatePost()" disabled>
            <span class="spinner"></span>
            <span class="btn-text">포스팅 본문 생성하기 →</span>
          </button>
        </div>
        <div class="err-msg" id="err2"></div>
      </div>
    </div>

    <!-- STEP 3: 포스팅 결과 -->
    <div class="card locked" id="step3">
      <div class="card-header">
        <div class="card-num">3</div>
        <div>
          <div class="card-title">생성된 포스팅</div>
          <div class="card-sub" id="step3Sub">완성된 블로그 포스팅입니다</div>
        </div>
      </div>
      <div class="card-body">
        <div class="output-area" id="postOutput"></div>
        <div id="refBlock"></div>
        <div id="disclaimerBlock"></div>
        <div class="tags-wrap" id="tagsWrap"></div>
        <div class="copy-area">
          <button class="btn btn-primary" onclick="copyPost()">📋 본문 복사</button>
          <button class="btn btn-ghost" onclick="resetAll()">↺ 다시 시작</button>
        </div>
      </div>
    </div>

    <div class="reset-area">
      <button class="btn btn-secondary" onclick="resetAll()">↺ 처음부터 다시 시작</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="admin-container">
    <div class="admin-header">
      <h1>⚙️ 관리자 패널</h1>
      <p>블로그 플래너 — 사용자 및 크레딧 관리</p>
    </div>
    <div class="admin-card">
      <h3>새 게스트 계정 생성</h3>
      <div class="admin-row">
        <div class="admin-field"><label>아이디</label><input type="text" class="admin-input" id="newUserId" placeholder="guest01"></div>
        <div class="admin-field"><label>비밀번호</label><input type="text" class="admin-input" id="newUserPw" placeholder="비밀번호"></div>
        <div class="admin-field"><label>크레딧</label><input type="number" class="admin-input" id="newUserCredits" value="4" min="1" style="max-width:80px;"></div>
        <button class="btn btn-primary" onclick="createUser()">계정 생성</button>
      </div>
      <div class="admin-msg" id="createMsg"></div>
    </div>
    <div class="admin-card">
      <h3>사용자 목록</h3>
      <div id="userTableWrap"><p style="color:var(--text-dim);font-size:13px;">불러오는 중...</p></div>
    </div>
    <div class="admin-card">
      <h3>크레딧 충전</h3>
      <div class="admin-row">
        <div class="admin-field"><label>아이디</label><input type="text" class="admin-input" id="chargeUserId" placeholder="충전할 아이디"></div>
        <div class="admin-field"><label>충전량</label><input type="number" class="admin-input" id="chargeAmount" value="4" min="1" style="max-width:80px;"></div>
        <button class="btn btn-primary" onclick="chargeCredits()">충전</button>
      </div>
      <div class="admin-msg" id="chargeMsg"></div>
    </div>
    <div style="text-align:center;margin-top:24px;">
      <button class="btn btn-secondary" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
</div>

<script>
let session = { userId:null, password:null, role:null, remaining:0 };
let selectedCategory = '';
let needsRef = false;
let generatedPost = '';

const CATEGORIES_WITH_DISCLAIMER = ['의학/건강', '법률', '재테크/경제'];

document.getElementById('loginId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPw').focus(); });
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('finalTitle').addEventListener('input', () => {
  document.getElementById('btn2').disabled = !document.getElementById('finalTitle').value.trim();
});

function toggleAdminLogin() {
  const id = document.getElementById('loginId');
  id.placeholder = id.placeholder === '아이디' ? '관리자 아이디 (admin)' : '아이디';
  document.querySelector('.admin-toggle').textContent = id.placeholder === '아이디' ? '관리자 로그인' : '일반 로그인';
}

async function doLogin() {
  const userId = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPw').value.trim();
  if (!userId || !password) { showLoginErr('아이디와 비밀번호를 입력해주세요.'); return; }
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true); hideLoginErr();
  try {
    const res = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'login', userId, password })
    });
    const data = await res.json();
    if (!res.ok) { showLoginErr(data.error || '로그인 실패'); return; }
    session = { userId, password, role: data.role, remaining: data.remaining };
    document.getElementById('loginScreen').style.display = 'none';
    if (data.role === 'admin') {
      document.getElementById('adminScreen').style.display = 'block';
      loadAdminUsers();
    } else {
      document.getElementById('appScreen').style.display = 'block';
      updateCreditDisplay();
    }
  } catch(e) {
    showLoginErr('서버 연결 오류. 잠시 후 다시 시도해주세요.');
  } finally { setLoading(btn, false); }
}

function doLogout() {
  session = {};
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  resetAll();
}

function updateCreditDisplay() {
  const dot = document.getElementById('creditDot');
  const text = document.getElementById('creditText');
  const r = session.remaining;
  if (r === 9999) { dot.className='credit-dot'; text.textContent='무제한'; return; }
  text.textContent = `${r}회 남음`;
  dot.className = 'credit-dot' + (r <= 0 ? ' empty' : r <= 1 ? ' low' : '');
}

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCategory = btn.dataset.cat;
  needsRef = btn.dataset.ref === 'true';
}

async function callClaude(systemPrompt, userMessage, btnId, errId, useWebSearch = false) {
  const btn = document.getElementById(btnId);
  setLoading(btn, true); hideErr(errId);
  try {
    const res = await fetch('/api/claude', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ userId: session.userId, password: session.password, systemPrompt, userMessage, useWebSearch })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API 오류');
    return data.text;
  } catch(e) {
    showErr(errId, '오류: ' + e.message);
    return null;
  } finally { setLoading(btn, false); }
}

// STEP 1: 제목 추천
async function generateTitles() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { showErr('err1', '키워드를 입력해주세요.'); return; }
  if (!selectedCategory) { showErr('err1', '카테고리를 선택해주세요.'); return; }

  const platform = document.getElementById('platform').value;
  const postFormat = document.getElementById('postFormat').value;
  const postLength = document.getElementById('postLength').value;

  const system = `당신은 블로그 SEO 전문가입니다. 반드시 JSON으로만 응답하세요:
{"titles": ["제목1", "제목2", "제목3"]}`;

  const user = `키워드: "${keyword}"
카테고리: ${selectedCategory}
플랫폼: ${platform}
형식: ${postFormat}
길이: ${postLength}

클릭률이 높고 검색 최적화된 블로그 포스팅 제목 3개를 추천해주세요.
- 구체적인 숫자나 정보 포함
- 독자의 궁금증을 자극
- ${platform} SEO에 최적화
JSON으로만 응답하세요.`;

  const result = await callClaude(system, user, 'btn1', 'err1');
  if (!result) return;

  try {
    const clean = result.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    renderTitles(parsed.titles);
    activateStep(2); markDone(1);
    document.getElementById('step2').scrollIntoView({ behavior:'smooth', block:'start' });
  } catch(e) {
    showErr('err1', '응답 오류. 다시 시도해주세요.');
  }
}

function renderTitles(titles) {
  const container = document.getElementById('titleOptions');
  container.innerHTML = '';
  titles.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'title-option';
    div.innerHTML = `<span class="title-n">${i+1}.</span><span class="title-text">${t}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.title-option').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById('finalTitle').value = t;
      document.getElementById('btn2').disabled = false;
    };
    container.appendChild(div);
  });
}

// STEP 2: 포스팅 생성
async function generatePost() {
  const title = document.getElementById('finalTitle').value.trim();
  if (!title) { showErr('err2', '제목을 입력해주세요.'); return; }

  const keyword = document.getElementById('keyword').value.trim();
  const platform = document.getElementById('platform').value;
  const postFormat = document.getElementById('postFormat').value;
  const postLength = document.getElementById('postLength').value;
  const postTone = document.getElementById('postTone').value;

  const needsDisclaimer = CATEGORIES_WITH_DISCLAIMER.includes(selectedCategory);

  const system = `당신은 전문 블로그 작가입니다. ${platform}에 최적화된 블로그 포스팅을 작성합니다.
작성 규칙:
- 제목은 포함하지 말고 본문만 작성
- 소제목은 ## 형식 사용
- ${postTone} 톤으로 작성
- 자연스러운 키워드 배치로 SEO 최적화
- 마지막에 반드시 추천 태그를 JSON 형식으로 포함: {"tags": ["태그1", "태그2", ...]}
${needsRef ? '- 본문 마지막 부분에 ## 참고자료 섹션을 만들고 관련 근거/출처를 명시하세요' : ''}`;

  const user = `제목: "${title}"
키워드: ${keyword}
카테고리: ${selectedCategory}
형식: ${postFormat}
길이: ${postLength}

위 조건으로 완성된 블로그 포스팅을 작성해주세요.`;

  // 의학/법률/경제는 웹 검색 활용
  const result = await callClaude(system, user, 'btn2', 'err2', needsRef);
  if (!result) return;

  // 태그 파싱
  let tags = [];
  let postContent = result;
  const tagMatch = result.match(/\{"tags":\s*\[([^\]]+)\]\}/);
  if (tagMatch) {
    try {
      const parsed = JSON.parse(tagMatch[0]);
      tags = parsed.tags;
      postContent = result.replace(tagMatch[0], '').trim();
    } catch(e) {}
  }

  generatedPost = postContent;
  renderPost(postContent, tags, needsDisclaimer, title);
  await useCredit();
  markDone(2); activateStep(3);
  document.getElementById('step3').scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderPost(content, tags, needsDisclaimer, title) {
  // 마크다운 → HTML 간단 변환
  let html = content
    .replace(/## (.+)/g, '<h2>$1</h2>')
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';

  document.getElementById('postOutput').innerHTML = `<h2 style="font-size:20px;font-weight:900;margin-bottom:16px;color:var(--text);">${title}</h2>` + html;

  // 면책 문구
  if (needsDisclaimer) {
    const cat = selectedCategory;
    let msg = '';
    if (cat === '의학/건강') msg = '본 콘텐츠는 AI가 생성한 의학 정보로, 오류가 있을 수 있습니다. 반드시 전문의의 진단과 처방을 받으시기 바랍니다.';
    else if (cat === '법률') msg = '본 콘텐츠는 AI가 생성한 법률 정보로, 실제 법적 효력이 없습니다. 구체적인 사안은 반드시 변호사 등 전문가와 상담하세요.';
    else if (cat === '재테크/경제') msg = '본 콘텐츠는 AI가 생성한 금융 정보로, 투자 손실에 대한 책임을 지지 않습니다. 투자 결정 전 전문 금융인과 상담하세요.';
    document.getElementById('disclaimerBlock').innerHTML = `
      <div class="disclaimer">
        <span class="disclaimer-icon">⚠️</span>
        <span>${msg}</span>
      </div>`;
  } else {
    document.getElementById('disclaimerBlock').innerHTML = '';
  }

  // 태그
  if (tags.length > 0) {
    document.getElementById('tagsWrap').innerHTML = tags.map(t => `<span class="tag">#${t}</span>`).join('');
  }

  document.getElementById('step3Sub').textContent = `${selectedCategory} · ${document.getElementById('platform').value} 최적화`;
}

function copyPost() {
  const title = document.getElementById('finalTitle').value;
  const content = document.getElementById('postOutput').innerText;
  const disclaimer = document.getElementById('disclaimerBlock').innerText;
  const tags = Array.from(document.querySelectorAll('.tag')).map(t => t.textContent).join(' ');
  const full = `${title}\n\n${content}\n\n${disclaimer}\n\n${tags}`.trim();
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.querySelector('.copy-area .btn-primary');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.innerHTML = '📋 본문 복사', 2000);
  });
}

async function useCredit() {
  try {
    const res = await fetch('/api/update-credit', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ userId: session.userId, password: session.password })
    });
    const data = await res.json();
    if (data.success) { session.remaining = data.remaining; updateCreditDisplay(); }
  } catch(e) {}
}

// ADMIN
async function loadAdminUsers() {
  try {
    const res = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'admin_login', adminKey: session.password, userId: session.userId, password: session.password })
    });
    const data = await res.json();
    if (data.users) renderUserTable(data.users);
  } catch(e) {}
}

function renderUserTable(users) {
  const wrap = document.getElementById('userTableWrap');
  const keys = Object.keys(users);
  if (!keys.length) { wrap.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">등록된 사용자 없음</p>'; return; }
  let html = `<table class="user-table"><thead><tr>
    <th>아이디</th><th>역할</th><th>크레딧</th><th>사용</th><th>잔여</th><th>상태</th>
  </tr></thead><tbody>`;
  keys.forEach(id => {
    const u = users[id];
    const rem = u.credits - (u.used || 0);
    html += `<tr>
      <td style="font-family:'DM Mono',monospace;">${id}</td>
      <td>${u.role || 'guest'}</td>
      <td>${u.credits}</td>
      <td>${u.used || 0}</td>
      <td><span class="badge ${rem <= 0 ? 'badge-inactive' : rem <= 1 ? 'badge-low' : 'badge-active'}">${rem}</span></td>
      <td><span class="badge ${u.active ? 'badge-active' : 'badge-inactive'}">${u.active ? '활성' : '비활성'}</span></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

async function createUser() {
  const userId = document.getElementById('newUserId').value.trim();
  const password = document.getElementById('newUserPw').value.trim();
  const credits = parseInt(document.getElementById('newUserCredits').value);
  if (!userId || !password) { showAdminMsg('createMsg', '아이디와 비밀번호를 입력해주세요.', 'err'); return; }
  try {
    const res = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'create_user', userId: session.userId, password: session.password, adminKey: session.password, newUser: { id: userId, pw: password, credits, role: 'guest' } })
    });
    const data = await res.json();
    if (!res.ok) { showAdminMsg('createMsg', data.error || '오류', 'err'); return; }
    showAdminMsg('createMsg', `✅ ${userId} 계정이 생성되었습니다!`, 'ok');
    loadAdminUsers();
  } catch(e) { showAdminMsg('createMsg', '서버 오류', 'err'); }
}

async function chargeCredits() {
  const id = document.getElementById('chargeUserId').value.trim();
  const amount = parseInt(document.getElementById('chargeAmount').value);
  if (!id) { showAdminMsg('chargeMsg', '아이디를 입력해주세요.', 'err'); return; }
  try {
    const res = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'charge_credits', userId: session.userId, password: session.password, adminKey: session.password, id, amount })
    });
    const data = await res.json();
    if (!res.ok) { showAdminMsg('chargeMsg', data.error || '오류', 'err'); return; }
    showAdminMsg('chargeMsg', `✅ ${id} 계정에 ${amount}크레딧 충전 완료!`, 'ok');
    loadAdminUsers();
  } catch(e) { showAdminMsg('chargeMsg', '서버 오류', 'err'); }
}

// UTILS
function activateStep(n) { const s=document.getElementById(`step${n}`); s.classList.remove('locked'); s.classList.add('active'); }
function markDone(n) { const s=document.getElementById(`step${n}`); s.classList.remove('active'); s.classList.add('done'); }
function setLoading(btn, on) { if(!btn)return; on?btn.classList.add('loading'):btn.classList.remove('loading'); btn.disabled=on; }
function showErr(id, msg) { const e=document.getElementById(id); if(e){e.textContent=msg;e.style.display='block';} }
function hideErr(id) { const e=document.getElementById(id); if(e)e.style.display='none'; }
function showLoginErr(msg) { const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display='block'; }
function hideLoginErr() { document.getElementById('loginErr').style.display='none'; }
function showAdminMsg(id, msg, type) { const e=document.getElementById(id); e.textContent=msg; e.className=`admin-msg ${type}`; e.style.display='block'; }

function resetAll() {
  selectedCategory=''; needsRef=false; generatedPost='';
  ['step2','step3'].forEach(id => { const s=document.getElementById(id); s.classList.remove('active','done'); s.classList.add('locked'); });
  document.getElementById('step1').classList.remove('done'); document.getElementById('step1').classList.add('active');
  document.getElementById('keyword').value='';
  document.getElementById('titleOptions').innerHTML='';
  document.getElementById('finalTitle').value='';
  document.getElementById('postOutput').innerHTML='';
  document.getElementById('refBlock').innerHTML='';
  document.getElementById('disclaimerBlock').innerHTML='';
  document.getElementById('tagsWrap').innerHTML='';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  ['err1','err2'].forEach(id=>hideErr(id));
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
